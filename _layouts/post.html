---
layout: site
---

<div class="post-layout">
  <article class="post-page">
    <header class="post-page-header">
      <h1 class="post-page-title rainbow-inline-text">{{ page.title }}</h1>

      <p class="post-page-meta">
        {{ page.date | date: "%B %-d, %Y" }}
        {% if page.categories and page.categories.size > 0 %}
          &nbsp;•&nbsp;
          {{ page.categories | join: ", " }}
        {% endif %}
      </p>
    </header>

    <div class="post-page-content" id="post-content">
      {{ content }}
    </div>
  </article>

  <aside class="post-toc" id="post-toc-wrap">
    <div class="post-toc-card">
      <h2 class="post-toc-title"><span class="rainbow-inline-text">Outline</span></h2>
      <nav id="post-toc"></nav>
    </div>
  </aside>
</div>
